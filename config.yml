# Flight monitor — Milan → San Francisco → Anchorage, August 2026
# Data source: SerpAPI Google Flights engine.
#
# The trip is two round trips that combine:
#   1. MXP <-> SFO  (long-haul, visit cousin near SF)
#   2. SFO <-> ANC  (Alaska hop in the middle)
# Trip total = cheapest MXP<->SFO option + cheapest SFO<->ANC option.

trip_name: "Milan -> San Francisco -> Anchorage (August)"
currency: EUR
adults: 1
travel_class: 1   # SerpAPI: 1=economy, 2=premium economy, 3=business, 4=first

segments:
  - id: MXP-SFO
    label: "Milan <-> San Francisco"
    departure: MXP
    arrival: SFO
    in_total: true
    date_options:
      - { outbound: 2026-08-05, return: 2026-08-21 }
      - { outbound: 2026-08-06, return: 2026-08-21 }

  - id: SFO-ANC
    label: "San Francisco <-> Anchorage"
    departure: SFO
    arrival: ANC
    in_total: true
    date_options:
      - { outbound: 2026-08-06, return: 2026-08-20 }
      - { outbound: 2026-08-07, return: 2026-08-20 }

  # Baseline for comparison only — NOT added to the trip total.
  # Tells you what the San Francisco detour costs vs flying straight to Alaska.
  - id: MXP-ANC-direct
    label: "Milan <-> Anchorage (no SF stop)"
    departure: MXP
    arrival: ANC
    in_total: false
    date_options:
      - { outbound: 2026-08-06, return: 2026-08-20 }

# Alerting thresholds (percent)
alert_drop_pct: 10        # alert if a tracked option (or the trip total) drops >= 10%
alert_new_route_pct: 15   # alert if a new date option is >= 15% cheaper than the prior cheapest in its segment

state_path: state/prices.json
